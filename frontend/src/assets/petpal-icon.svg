<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <!-- PetPal Paw Icon - exact match -->

  <!-- Left outer toe bean (smaller, lower, tilted left) -->
  <ellipse cx="20" cy="30" rx="9" ry="13" fill="#A78BFA" transform="rotate(-15 20 30)"/>

  <!-- Left inner toe bean (larger, higher) -->
  <ellipse cx="38" cy="14" rx="11" ry="14" fill="#A78BFA"/>

  <!-- Right inner toe bean (larger, higher) -->
  <ellipse cx="62" cy="14" rx="11" ry="14" fill="#A78BFA"/>

  <!-- Right outer toe bean (smaller, lower, tilted right) -->
  <ellipse cx="80" cy="30" rx="9" ry="13" fill="#A78BFA" transform="rotate(15 80 30)"/>

  <!-- Main paw pad - organic shape with two bottom lobes -->
  <path d="M 50 42
           C 32 42, 17 50, 17 62
           C 17 74, 25 86, 36 89
           C 42 91, 46 86, 50 82
           C 54 86, 58 91, 64 89
           C 75 86, 83 74, 83 62
           C 83 50, 68 42, 50 42 Z"
        fill="#A78BFA"/>

  <!-- White heart cutout -->
  <path d="M 50 58
           C 50 54, 46.5 50, 42.5 50
           C 37 50, 34 54, 34 59
           C 34 65, 40 71, 50 78
           C 60 71, 66 65, 66 59
           C 66 54, 63 50, 57.5 50
           C 53.5 50, 50 54, 50 58 Z"
        fill="white"/>
</svg>
